name: Module Borrowing CI

on:
  push:
    branches:
      - develop
      - main
      - master
      - workos
    paths:
      - 'Modules/Borrowing/**'
      - 'resources/js/pages/borrowing/**'
      - 'tests/Feature/BorrowingWorkflowTest.php'
      - '.github/workflows/module-borrowing.yml'
      - 'composer.json'
      - 'composer.lock'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'vite-module-loader.js'
      - 'app/**'
      - 'config/**'
      - 'database/**'
      - 'bootstrap/**'
      - 'routes/**'
  pull_request:
    branches:
      - develop
      - main
      - master
      - workos
    paths:
      - 'Modules/Borrowing/**'
      - 'resources/js/pages/borrowing/**'
      - 'tests/Feature/BorrowingWorkflowTest.php'
      - '.github/workflows/module-borrowing.yml'
      - 'composer.json'
      - 'composer.lock'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'vite-module-loader.js'
      - 'app/**'
      - 'config/**'
      - 'database/**'
      - 'bootstrap/**'
      - 'routes/**'

permissions:
  contents: read

jobs:
  test:
    name: Test PHP 8.4
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Get Composer Cache Directory
        id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer Dependencies
        uses: actions/cache@v6
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Node Dependencies
        run: npm ci

      - name: Install PHP Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Build Assets
        run: npm run build

      - name: Run Type Analysis
        run: composer types:check

      - name: Run All Tests
        run: php artisan test
