name: Docker Build & Smoke Test CI

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.dockerignore'
      - '.github/workflows/docker-build.yml'
      - 'app/**'
      - 'bootstrap/**'
      - 'config/**'
      - 'database/**'
      - 'resources/**'
      - 'routes/**'
      - 'composer.json'
      - 'package.json'
      - 'vite.config.ts'
      - 'vite-module-loader.js'
  pull_request:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.dockerignore'
      - '.github/workflows/docker-build.yml'
      - 'app/**'
      - 'bootstrap/**'
      - 'config/**'
      - 'database/**'
      - 'resources/**'
      - 'routes/**'
      - 'composer.json'
      - 'package.json'
      - 'vite.config.ts'
      - 'vite-module-loader.js'

permissions:
  contents: read

jobs:
  docker-test:
    name: Build & Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Build Docker Image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: inventory-monitoring-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Docker Compose services
        env:
          APP_KEY: ${{ secrets.CI_APP_KEY }}
          DB_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
        run: |
          docker compose up -d

      - name: Wait for services to be ready
        run: |
          echo "Waiting for db service to be healthy..."
          for i in {1..20}; do
            STATUS=$(docker inspect --format='{{json .State.Health.Status}}' $(docker compose ps -q db))
            if [ "$STATUS" = "\"healthy\"" ]; then
              echo "DB is healthy!"
              break
            fi
            echo "Current DB status: $STATUS. Waiting..."
            sleep 2
          done

      - name: Run HTTP Smoke Test
        id: smoke_test
        run: |
          echo "Waiting for web service to be fully up and running..."
          MAX_RETRIES=15
          for i in $(seq 1 $MAX_RETRIES); do
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000 || echo "failed")
            if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "302" ]; then
              echo "Smoke test passed successfully! HTTP status: $RESPONSE"
              exit 0
            fi
            echo "Attempt $i/$MAX_RETRIES: Web service responded with HTTP status: $RESPONSE. Retrying in 2s..."
            sleep 2
          done
          echo "Smoke test failed after $MAX_RETRIES attempts."
          exit 1

      - name: Print Container Logs on Failure
        if: failure()
        run: |
          echo "=== Web Container Logs ==="
          docker compose logs web
          echo "=== DB Container Logs ==="
          docker compose logs db

      - name: Stop Docker Compose services
        if: always()
        run: |
          docker compose down -v

  docker-publish:
    name: Push to GHCR (Production)
    needs: docker-test
    runs-on: ubuntu-latest
    # Only push to registry on pushes to main (not on PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to the Container registry
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5.6.1
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
