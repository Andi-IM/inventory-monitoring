name: Release CI

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Install Node Dependencies
        run: npm ci

      - name: Install PHP Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Build Assets
        run: npm run build

      - name: Run Type Analysis
        run: composer types:check

      - name: Run All Tests
        run: php artisan test

      - name: Calculate next tag
        id: dry_tag
        uses: anothrNick/github-tag-action@v1
        with:
          dry_run: true
          WITH_V: true
          INITIAL_VERSION: 0.1.0
          DEFAULT_BUMP: patch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update CHANGELOG.md
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            COMMIT_RANGE="$PREV_TAG..HEAD"
          else
            COMMIT_RANGE="HEAD"
          fi

          NEW_VERSION="${{ steps.dry_tag.outputs.new_tag }}"
          DATE=$(date +%Y-%m-%d)

          echo -e "## [$NEW_VERSION] - $DATE\n" > temp_changelog.md

          # Added (features)
          FEATS=$(git log $COMMIT_RANGE --grep="^feat" --format="- %s (%h)" || echo "")
          if [ -n "$FEATS" ]; then
            echo -e "### Added\n$FEATS\n" >> temp_changelog.md
          fi

          # Fixed (bug fixes)
          FIXES=$(git log $COMMIT_RANGE --grep="^fix" --format="- %s (%h)" || echo "")
          if [ -n "$FIXES" ]; then
            echo -e "### Fixed\n$FIXES\n" >> temp_changelog.md
          fi

          # Others
          OTHERS=$(git log $COMMIT_RANGE --grep="^feat\|^fix" --invert-grep --format="- %s (%h)" | grep -v "chore(release):" || echo "")
          if [ -n "$OTHERS" ]; then
            echo -e "### Other Changes\n$OTHERS\n" >> temp_changelog.md
          fi

          if [ -f CHANGELOG.md ]; then
            head -n 3 CHANGELOG.md > header.md
            tail -n +4 CHANGELOG.md > rest.md
            cat header.md temp_changelog.md rest.md > CHANGELOG.md
            rm header.md rest.md
          else
            echo -e "# Changelog\n\nAll notable changes to this project will be documented in this file.\n" > CHANGELOG.md
            cat temp_changelog.md >> CHANGELOG.md
          fi
          rm temp_changelog.md
        shell: bash

      - name: Commit and push CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if ! git diff --cached --quiet; then
            git commit -m "chore(release): update CHANGELOG.md for ${{ steps.dry_tag.outputs.new_tag }} [skip ci]"
            git push origin main
          fi
        shell: bash

      - name: Bump version and push tag
        id: tag_version
        uses: anothrNick/github-tag-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          INITIAL_VERSION: 0.1.0
          DEFAULT_BUMP: patch

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v2.0.5
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
