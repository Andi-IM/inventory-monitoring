version: '3.8'

services:
  web:
    image: inventory-monitoring-web:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '8000:80'
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      APP_KEY: base64:v1Zk4xNlhPWFZpTUtSU3RjMmUzaWlhM2RhNnFlcTc= # Generated default key
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: inventory_monitoring
      DB_USERNAME: laravel
      DB_PASSWORD: secret_password
      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
    volumes:
      # Optional: mount storage for persistent local storage uploads
      - app_storage:/var/www/html/storage

  db:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: inventory_monitoring
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laravel -d inventory_monitoring"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  app_storage:
